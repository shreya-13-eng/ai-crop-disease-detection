spring:
  application:
    name: Ai-Crop-Disease-Detection
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5432/data_jpa
    username: postgres
    password: REMOVED
    driver-class-name: org.postgresql.Driver

  app:
    jwtSecret : REMOVED
    jwtExpirationMs : 86400000

  mail:
    host: smtp.gmail.com
    port: 587
    username: { }
    password: { }
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
